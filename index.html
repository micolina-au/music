<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎵 Music Share</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;1,300&family=Shippori+Mincho:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f3ee;
    --surface: #ffffff;
    --border: #e0dbd0;
    --text: #1a1814;
    --muted: #9a9489;
    --accent: #c0392b;
    --accent-light: #f9ece9;
    --mono: 'DM Mono', monospace;
    --serif: 'Shippori Mincho', serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    padding: 48px 16px 80px;
  }

  header {
    max-width: 640px;
    margin: 0 auto 48px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 24px;
  }

  header h1 {
    font-family: var(--serif);
    font-size: 1.8rem;
    font-weight: 600;
    letter-spacing: 0.02em;
    margin-bottom: 6px;
  }

  header p {
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .container {
    max-width: 640px;
    margin: 0 auto;
  }

  .track-list {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .track-card {
    background: var(--surface);
    border: 1px solid var(--border);
    overflow: hidden;
    animation: fadeIn 0.25s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .track-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    padding: 16px 18px 12px;
    gap: 12px;
  }

  .track-meta { flex: 1; min-width: 0; }

  .track-index {
    font-size: 0.62rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    margin-bottom: 3px;
  }

  .track-title {
    font-family: var(--serif);
    font-size: 1rem;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 2px;
  }

  .track-url {
    font-size: 0.65rem;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    letter-spacing: 0.03em;
  }

  .track-actions {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }

  .btn-icon {
    background: none;
    border: 1px solid var(--border);
    width: 30px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 0.75rem;
    color: var(--muted);
    transition: all 0.15s;
    flex-shrink: 0;
    text-decoration: none;
  }

  .btn-icon:hover { border-color: var(--accent); color: var(--accent); }

  .track-memo {
    font-size: 0.75rem;
    color: #7a7570;
    line-height: 1.6;
    white-space: pre-wrap;
    border-top: 1px dashed var(--border);
    padding: 10px 18px 12px;
  }

  .btn-play {
    background: var(--accent-light);
    border-color: #e8c5bf;
    color: var(--accent);
  }

  .btn-play:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

  .list-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .list-header h2 {
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .count-badge {
    font-size: 0.65rem;
    background: var(--text);
    color: var(--bg);
    padding: 2px 8px;
    letter-spacing: 0.06em;
  }
</style>
</head>
<body>

<header>
  <h1>🎵 Music Share</h1>
  <p>YOUTUBE LINKS — SHARED WITH FRIENDS</p>
</header>

<div class="container">

  <div class="list-header">
    <h2>プレイリスト</h2>
    <span class="count-badge" id="count-badge">0 曲</span>
  </div>

  <div class="track-list" id="track-list"></div>

</div>

<script>
  const tracks = [
    {
      id: 1,
      title: "カルメン",
      url: "https://www.youtube.com/watch?v=378F-eiFZEE&list=RD378F-eiFZEE&start_radio=1",
      memo: "オペラ、ビゼーのカルメン"
    },
    {
      id: 2,
      title: "この野原いっぱい",
      url: "https://www.youtube.com/watch?v=BZBbi7bUa3M&list=RDBZBbi7bUa3M&start_radio=1",
      memo: "1967年（昭和42年）森山良子"
    },
    {
      id: 3,
      title: "愛の讃歌",
      url: "https://www.youtube.com/watch?v=EQK4PNpKFbY&list=RDEQK4PNpKFbY&start_radio=1",
      memo: "1952年（昭和24年）越路吹雪"
    },
    {
      id: 4,
      title: "さくら貝の歌",
      url: "https://www.youtube.com/watch?v=KqmJNLzcZbc&list=RDKqmJNLzcZbc&start_radio=1",
      memo: "1949年（昭和29年）賠償千恵子、NHKラジオ歌謡"
    },
    {
      id: 5,
      title: "東京ブギウギ",
      url: "https://www.youtube.com/watch?v=0e-AiyIjydI&list=RD0e-AiyIjydI&start_radio=1",
      memo: "1948年（昭和23年）笠置シヅ子"
    },
    {
      id: 6,
      title: "かんぴょう",
      url: "https://www.youtube.com/watch?v=02qfEER8lzI&list=RD02qfEER8lzI&start_radio=1",
      memo: "昭和初期、北原白秋作詞"
    },
    {
      id: 7,
      title: "夏の思い出",
      url: "https://www.youtube.com/watch?v=A9RD1v8ix_A&list=RDA9RD1v8ix_A&start_radio=1",
      memo: "1949年(昭和24年）、中田喜直　作詞、賠償千恵子　歌"
    },
    {
      id: ,
      title: "椰子の実",
      url: "https://www.youtube.com/watch?v=1dAEZh8E1fw&list=RD1dAEZh8E1fw&start_radio=1",
      memo: "1936(昭和11年）発表、島崎藤村　作詞、賠償千恵子　歌"
    }
  ];

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function render() {
    const list  = document.getElementById('track-list');
    const badge = document.getElementById('count-badge');

    badge.textContent = tracks.length + ' 曲';

    list.innerHTML = tracks.map((t, i) => `
      <div class="track-card">
        <div class="track-header">
          <div class="track-meta">
            <div class="track-index">TRACK ${String(i+1).padStart(2,'0')}</div>
            <div class="track-title" title="${escHtml(t.title)}">${escHtml(t.title)}</div>
            <div class="track-url">${escHtml(t.url)}</div>
          </div>
          <div class="track-actions">
            <a class="btn-icon btn-play" href="${t.url}" target="_blank" rel="noopener" title="YouTubeで開く">▶</a>
          </div>
        </div>
        ${t.memo ? `<div class="track-memo">${escHtml(t.memo)}</div>` : ''}
      </div>
    `).join('');
  }

  render();
</script>
</body>
</html>
